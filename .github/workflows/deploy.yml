name: Deploy to VPS (superseded by VPS pull)

# Deploys are now PULL-BASED on the VPS: the esv-deploy.timer systemd timer polls
# origin/main every 2 minutes and runs deploy.sh on change (see deploy/ and
# DECISIONS.md). The old push -> SSH model was abandoned because GitHub-hosted
# runner IPs are dropped at this provider's network edge (inbound SSH to the VPS
# times out intermittently), while the VPS's outbound pull from GitHub is reliable.
#
# This workflow is kept as a manual-only no-op so pushes no longer fail on the
# unreachable SSH step.
on:
  workflow_dispatch:

jobs:
  info:
    name: Deploy info
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploys run on the VPS via the esv-deploy.timer pull poller."
          echo "Push to main and the VPS picks it up within ~2 minutes."
