# Included from the production server block for englishspeakinggermany.online.
# The shared limit_req_zone declarations live in web-app/nginx_site.conf because
# Nginx only permits them in the surrounding http context.

location = /api/contact {
    client_max_body_size 64k;
    limit_req zone=esv_contact_per_ip burst=4 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/confirm-vet {
    client_max_body_size 64k;
    limit_req zone=esv_confirm_per_ip burst=9 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/csp-report {
    client_max_body_size 16k;
    limit_req zone=esv_csp_report_per_ip burst=14 nodelay;
    limit_req_status 429;

    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/ {
    # Largest legitimate payload is a ~5000-char contact message; cap well above
    # that but far below the 1 MB nginx default to blunt junk-payload abuse.
    client_max_body_size 64k;
    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
