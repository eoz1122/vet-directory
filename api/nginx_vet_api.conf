# Add this to your Nginx server block for englishspeakinggermany.online

location /api/ {
    # Largest legitimate payload is a ~5000-char contact message; cap well above
    # that but far below the 1 MB nginx default to blunt junk-payload abuse.
    client_max_body_size 64k;
    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
