# ──────────────────────────────────────────────────────────────────────────────
# LIVE nginx config snapshot for englishspeakinggermany.online
#
# This file mirrors the ACTUAL deployed config at:
#   /etc/nginx/sites-available/englishspeakinggermany.online  (symlinked in sites-enabled)
# on the VPS (web root: /home/englishspeaking/englishspeakinggermany.online).
#
# NOTE: nginx config is NOT managed by the deploy pipeline (deploy.sh only rebuilds
# and copies the web root). Changes here must be applied manually on the VPS:
#   sudo nano /etc/nginx/sites-available/englishspeakinggermany.online
#   sudo nginx -t && sudo systemctl reload nginx
#
# SEO-CRITICAL (2026-06-21): try_files lists $uri/index.html FIRST so that a request
# for /vets/berlin serves the pre-rendered index.html directly (HTTP 200) instead of
# nginx 301-redirecting to /vets/berlin/. The sitemap and every <link rel="canonical">
# use the no-trailing-slash form; a redirect there made Google mark ~68 pages
# "Page with redirect" / "Alternative page with proper canonical" and drop them.
# Regression guard: web-app/scripts/seo-smoke-test.sh (expects 200, not 3xx).
#
# TODO (hardening NOT yet applied to live — recommended follow-up):
#   - Security headers: X-Frame-Options, X-Content-Type-Options, Referrer-Policy
#   - Static asset caching: location ~* \.(js|css|woff2|...)$ { expires 1y; immutable }
#   - gzip on; for text/css, application/javascript, application/json, image/svg+xml
# ──────────────────────────────────────────────────────────────────────────────

server {
    server_name englishspeakinggermany.online www.englishspeakinggermany.online;
    root /home/englishspeaking/englishspeakinggermany.online;
    include /home/englishspeaking/englishspeakinggermany.online/api/nginx_vet_api.conf;
    index index.html;
    location / {
        # $uri/index.html FIRST -> pre-rendered pages serve 200, no trailing-slash 301.
        # $uri kept for static assets (this block has no separate asset location).
        try_files $uri/index.html $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/englishspeakinggermany.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/englishspeakinggermany.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = englishspeakinggermany.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name englishspeakinggermany.online www.englishspeakinggermany.online;
    return 404; # managed by Certbot


}
