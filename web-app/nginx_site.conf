##
# Nginx site config for englishspeakinggermany.online
#
# CRITICAL for SEO: The try_files directive below serves pre-rendered static HTML
# files first (written by scripts/prerender.js at build time), so Googlebot gets
# unique <title> and <meta> tags per page instead of the generic index.html.
#
# Deploy: copy or symlink to /etc/nginx/sites-available/englishspeakinggermany.online
# and reload: sudo nginx -t && sudo systemctl reload nginx
##

server {
    listen 80;
    listen [::]:80;
    server_name englishspeakinggermany.online www.englishspeakinggermany.online;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name englishspeakinggermany.online www.englishspeakinggermany.online;

    # SSL certificates (managed by certbot / Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/englishspeakinggermany.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/englishspeakinggermany.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www -> non-www
    if ($host = www.englishspeakinggermany.online) {
        return 301 https://englishspeakinggermany.online$request_uri;
    }

    root /var/www/englishspeakinggermany.online/dist;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Static Assets (long cache) ───────────────────────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── API Proxy ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SPA Routing with Pre-Rendered HTML Priority ──────────────────────────
    #
    # ORDER MATTERS:
    # 1. Try the exact file (e.g. /assets/index.js)
    # 2. Try the pre-rendered directory index (e.g. /vets/berlin/index.html)
    #    <- This is what Googlebot reads, with the correct unique <title>
    # 3. Fall back to the root index.html for client-side routing
    #
    location / {
        try_files $uri $uri/index.html /index.html;
    }

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/ld+json image/svg+xml;
}
