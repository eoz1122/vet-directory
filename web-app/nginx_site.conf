# ──────────────────────────────────────────────────────────────────────────────
# LIVE nginx config snapshot for englishspeakinggermany.online
#
# Mirrors the ACTUAL deployed config at:
#   /etc/nginx/sites-available/englishspeakinggermany.online  (symlinked in sites-enabled)
# on the VPS (web root: /home/englishspeaking/englishspeakinggermany.online).
#
# nginx config is NOT managed by the deploy pipeline (deploy.sh only rebuilds and
# copies the web root). Apply changes manually on the VPS:
#   sudo nano /etc/nginx/sites-available/englishspeakinggermany.online
#   sudo nginx -t && sudo systemctl reload nginx
#
# SEO (2026-06-21): try_files lists $uri/index.html FIRST so canonical no-trailing-slash
# URLs (/vets/berlin, /blog/*) serve HTTP 200 instead of a trailing-slash 301.
# Guard: web-app/scripts/seo-smoke-test.sh.
#
# Perf/security (2026-06-21): added security headers + 1-year immutable caching for
# content-hashed static assets. gzip is already enabled globally in nginx.conf.
#
# Security (2026-07-11, audit wave 4): HSTS enabled with a deliberately short
# max-age (1 day) so it stays easy to roll back; bump to 31536000 once proven.
# Added Permissions-Policy (geolocation=self: the "near me" search uses it) and
# server_tokens off. CSP is a follow-up: needs testing against Google Maps/GA.
#
# SEO (2026-07-11, audit wave 3): unknown paths now return a real 404 via the
# prerendered /404 page (was: soft-404 SPA shell at HTTP 200); trailing-slash
# URLs 301 to canonical; /admin is the only SPA-shell exception.
# ──────────────────────────────────────────────────────────────────────────────

# Shared per-client request budgets for public write endpoints. These directives
# must remain in the http context, outside the server blocks below.
limit_req_zone $binary_remote_addr zone=esv_contact_per_ip:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=esv_confirm_per_ip:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=esv_csp_report_per_ip:10m rate=30r/m;

server {
    server_name englishspeakinggermany.online www.englishspeakinggermany.online;
    root /home/englishspeaking/englishspeakinggermany.online;
    include /home/englishspeaking/englishspeakinggermany.online/api/nginx_vet_api.conf;
    index index.html;

    # Hide nginx version in headers and error pages
    server_tokens off;

    # Security headers (apply to HTML + API; static assets get their own block below)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Short max-age on purpose (easy rollback); raise to 31536000 after a quiet week
    add_header Strict-Transport-Security "max-age=86400" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
    # Observe violations before enforcing. Inline script/style remain temporarily
    # allowed because GA initialization, JSON-LD, and Google Maps inject them.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://maps.gstatic.com https://maps.googleapis.com https://*.googleapis.com https://*.googleusercontent.com https://www.google.com https://www.google-analytics.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://www.googletagmanager.com https://maps.googleapis.com https://*.googleapis.com; frame-src 'self' https://www.google.com; worker-src 'self' blob:; manifest-src 'self'; report-uri /api/csp-report" always;
    # HTML + API revalidate every load so content edits show immediately. The asset
    # block below has its own add_header, so hashed assets keep their immutable cache.
    add_header Cache-Control "no-cache" always;

    # Google previously discovered literal placeholders from the retired
    # SearchAction schema. Redirect only those synthetic queries; real homepage
    # searches such as ?s=berlin and ?q=hamburg must continue to return 200.
    if ($request_uri ~ "^/[?](?:s|q)=(?:[{]search_term_string[}]|%7[Bb]search_term_string%7[Dd])$") {
        return 301 https://englishspeakinggermany.online/;
    }

    # Long-cache content-hashed static assets (Vite fingerprints these filenames).
    # NOTE: .json/.xml deliberately excluded (vets.json, sitemap.xml change between deploys).
    location ~* \.(js|css|woff2|woff|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp|avif|mp4)$ {
        # add_header does not inherit once redeclared: re-list security headers here
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=86400" always;
        try_files $uri =404;
    }

    # 301 redirects: retired year-stamped blog URLs -> evergreen slugs (migrated 2026-06).
    location = /blog/moving-to-germany-with-pet-2025 { return 301 https://englishspeakinggermany.online/blog/moving-to-germany-with-pet; }
    location = /blog/moving-to-germany-with-pet-2025/ { return 301 https://englishspeakinggermany.online/blog/moving-to-germany-with-pet; }
    location = /blog/cat-registration-germany-2025 { return 301 https://englishspeakinggermany.online/blog/cat-registration-germany; }
    location = /blog/cat-registration-germany-2025/ { return 301 https://englishspeakinggermany.online/blog/cat-registration-germany; }
    location = /blog/eu-pet-passport-germany-2025 { return 301 https://englishspeakinggermany.online/blog/eu-pet-passport-germany; }
    location = /blog/eu-pet-passport-germany-2025/ { return 301 https://englishspeakinggermany.online/blog/eu-pet-passport-germany; }
    location = /blog/hundesteuer-dog-tax-germany-2025 { return 301 https://englishspeakinggermany.online/blog/hundesteuer-dog-tax-germany; }
    location = /blog/hundesteuer-dog-tax-germany-2025/ { return 301 https://englishspeakinggermany.online/blog/hundesteuer-dog-tax-germany; }
    location = /blog/pet-friendly-apartments-germany-2025 { return 301 https://englishspeakinggermany.online/blog/pet-friendly-apartments-germany; }
    location = /blog/pet-friendly-apartments-germany-2025/ { return 301 https://englishspeakinggermany.online/blog/pet-friendly-apartments-germany; }
    location = /blog/public-transport-with-dogs-berlin-2025 { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-berlin; }
    location = /blog/public-transport-with-dogs-berlin-2025/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-berlin; }
    location = /blog/public-transport-with-dogs-hamburg-2025 { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-hamburg; }
    location = /blog/public-transport-with-dogs-hamburg-2025/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-hamburg; }
    location = /blog/public-transport-with-dogs-frankfurt-2025 { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-frankfurt; }
    location = /blog/public-transport-with-dogs-frankfurt-2025/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-frankfurt; }
    location = /blog/public-transport-with-dogs-munich-2025 { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-munich; }
    location = /blog/public-transport-with-dogs-munich-2025/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-munich; }
    location = /blog/public-transport-with-dogs-stuttgart-2025 { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-stuttgart; }
    location = /blog/public-transport-with-dogs-stuttgart-2025/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-stuttgart; }
    location = /blog/pet-sitting-germany-2025 { return 301 https://englishspeakinggermany.online/blog/pet-sitting-germany; }
    location = /blog/pet-sitting-germany-2025/ { return 301 https://englishspeakinggermany.online/blog/pet-sitting-germany; }
    location = /blog/pet-insurance-germany-2025 { return 301 https://englishspeakinggermany.online/blog/pet-insurance-germany; }
    location = /blog/pet-insurance-germany-2025/ { return 301 https://englishspeakinggermany.online/blog/pet-insurance-germany; }
    location = /blog/best-pet-food-germany-dinner-for-dogs { return 301 https://englishspeakinggermany.online/blog/best-dog-food-germany; }
    location = /blog/best-pet-food-germany-dinner-for-dogs/ { return 301 https://englishspeakinggermany.online/blog/best-dog-food-germany; }
    # Retired transport aliases previously linked from the Cologne guide.
    location = /blog/public-transport-dogs-hamburg { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-hamburg; }
    location = /blog/public-transport-dogs-hamburg/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-hamburg; }
    location = /blog/public-transport-dogs-munich-mvv { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-munich; }
    location = /blog/public-transport-dogs-munich-mvv/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-munich; }
    location = /blog/public-transport-dogs-frankfurt-rmv { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-frankfurt; }
    location = /blog/public-transport-dogs-frankfurt-rmv/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-frankfurt; }
    location = /blog/public-transport-dogs-stuttgart { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-stuttgart; }
    location = /blog/public-transport-dogs-stuttgart/ { return 301 https://englishspeakinggermany.online/blog/public-transport-with-dogs-stuttgart; }
    # Consolidate overlapping Hamburg emergency guides onto the stronger article.
    location = /guides/emergency-vets-hamburg { return 301 https://englishspeakinggermany.online/blog/emergency-vet-hamburg-english; }
    location = /guides/emergency-vets-hamburg/ { return 301 https://englishspeakinggermany.online/blog/emergency-vet-hamburg-english; }
    # Preserve the established Berlin guide URL and merge the overlapping article.
    location = /blog/emergency-vet-berlin-english { return 301 https://englishspeakinggermany.online/guides/emergency-vets-berlin; }
    location = /blog/emergency-vet-berlin-english/ { return 301 https://englishspeakinggermany.online/guides/emergency-vets-berlin; }
    # Retired district page (its only listed vet was a duplicate record, removed 2026-07)
    location = /vets/nuremberg/schweinau { return 301 https://englishspeakinggermany.online/vets/nuremberg; }
    location = /vets/nuremberg/schweinau/ { return 301 https://englishspeakinggermany.online/vets/nuremberg; }

    # Legacy sitemap paths preserved punctuation that no longer matches the
    # normalized district slugs. Redirect both variants directly to canonical.
    location = /vets/berlin/düppel/zehlendorf { return 301 https://englishspeakinggermany.online/vets/berlin/düppel-zehlendorf; }
    location = /vets/berlin/düppel/zehlendorf/ { return 301 https://englishspeakinggermany.online/vets/berlin/düppel-zehlendorf; }
    location = /vets/berlin/friedrichshain-/-others { return 301 https://englishspeakinggermany.online/vets/berlin/friedrichshain-others; }
    location = /vets/berlin/friedrichshain-/-others/ { return 301 https://englishspeakinggermany.online/vets/berlin/friedrichshain-others; }
    location = /vets/frankfurt/dr.-jan-kullen-/-dr.-elena-panova { return 301 https://englishspeakinggermany.online/vets/frankfurt/dr-jan-kullen-dr-elena-panova; }
    location = /vets/frankfurt/dr.-jan-kullen-/-dr.-elena-panova/ { return 301 https://englishspeakinggermany.online/vets/frankfurt/dr-jan-kullen-dr-elena-panova; }
    location = /vets/frankfurt/gallus/city-west { return 301 https://englishspeakinggermany.online/vets/frankfurt/gallus-city-west; }
    location = /vets/frankfurt/gallus/city-west/ { return 301 https://englishspeakinggermany.online/vets/frankfurt/gallus-city-west; }
    location = /vets/frankfurt/am-nordpark-10,-60437-frankfurt-am-main { return 301 https://englishspeakinggermany.online/vets/frankfurt/am-nordpark-10-60437-frankfurt-am-main; }
    location = /vets/frankfurt/am-nordpark-10,-60437-frankfurt-am-main/ { return 301 https://englishspeakinggermany.online/vets/frankfurt/am-nordpark-10-60437-frankfurt-am-main; }
    location = /vets/hamburg/bahrenfeld/altona { return 301 https://englishspeakinggermany.online/vets/hamburg/bahrenfeld-altona; }
    location = /vets/hamburg/bahrenfeld/altona/ { return 301 https://englishspeakinggermany.online/vets/hamburg/bahrenfeld-altona; }
    location = /vets/wiesloch/near-heidelberg/karlsruhe { return 301 https://englishspeakinggermany.online/vets/wiesloch/near-heidelberg-karlsruhe; }
    location = /vets/wiesloch/near-heidelberg/karlsruhe/ { return 301 https://englishspeakinggermany.online/vets/wiesloch/near-heidelberg-karlsruhe; }

    # Canonical URLs have no trailing slash: 301 any slashed variant (root unaffected).
    rewrite ^/(.+)/$ /$1 permanent;

    # /admin is the only client-only route (not prerendered): serve the SPA shell.
    location = /admin {
        try_files /index.html =404;
    }

    # Unknown paths return a real 404 (prerendered /404 page) instead of a
    # soft-404 SPA shell with HTTP 200. Every legitimate route is prerendered
    # to <route>/index.html, so the fallback is only ever hit by bad URLs.
    error_page 404 /404/index.html;
    location / {
        # $uri/index.html FIRST -> pre-rendered pages serve 200.
        try_files $uri/index.html $uri =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/englishspeakinggermany.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/englishspeakinggermany.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = englishspeakinggermany.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name englishspeakinggermany.online www.englishspeakinggermany.online;
    return 404; # managed by Certbot
}
